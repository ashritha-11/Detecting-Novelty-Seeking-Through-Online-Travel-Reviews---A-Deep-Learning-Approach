{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-5">
    <div class="glass-card">
      <h2 class="mb-4 text-center fw-bold"><i class="fa-solid fa-right-to-bracket text-primary me-2"></i>Login</h2>
      {% if error %}
        <div class="alert alert-warning border-0" style="background: rgba(245, 158, 11, 0.1); color: #FCD34D;">
           <i class="fa-solid fa-circle-exclamation me-2"></i>{{ error }}
        </div>
      {% endif %}
      <form method="post">
        <div class="mb-3">
          <label class="form-label text-muted" for="email">Email Address</label>
          <input id="email" name="email" type="email" class="form-control" placeholder="you@example.com" required>
        </div>
        <div class="mb-4">
          <label class="form-label text-muted" for="password">Password</label>
          <input id="password" name="password" type="password" class="form-control" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary w-100 btn-lg">Login</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
