{% extends "base.html" %}
{% block content %}

<h2>{{ category | capitalize }} Places</h2>

<div class="row">
  {% for place in places %}
    <div class="col-md-4">
      <div class="card p-3 mb-3">
        <h5>{{ place['name'] }}</h5>
        <p>{{ place['category'] }}</p>

        <a href="/place/{{ loop.index0 }}" class="btn btn-primary">
          View Details
        </a>
      </div>
    </div>
  {% endfor %}
</div>

{% endblock %}
